<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignSpeak — Real-Time Sign Language Recognition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #181e2e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #4fffb0;
    --accent2: #00e5ff;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --danger: #ff4d6d;
    --warn: #ffb347;
    --radius: 16px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(ellipse, rgba(79,255,176,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(ellipse, rgba(0,229,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(10,13,18,0.8);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .logo-text span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.detecting { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 1.2s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* MAIN LAYOUT */
  main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    height: calc(100vh - 68px);
  }

  /* VIDEO COLUMN */
  .video-col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .video-area {
    flex: 1;
    position: relative;
    background: #050709;
    overflow: hidden;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  #overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }

  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: radial-gradient(ellipse at center, #0d1220 0%, #050709 100%);
  }
  .video-placeholder .icon { font-size: 48px; opacity: 0.3; }
  .video-placeholder p {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    max-width: 200px;
    line-height: 1.6;
  }

  /* Detection badge overlay */
  .detect-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(10,13,18,0.85);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    backdrop-filter: blur(8px);
    display: none;
  }
  .detect-badge.visible { display: flex; align-items: center; gap: 8px; }

  /* Confidence meter */
  .conf-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(10,13,18,0.85);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    gap: 4px;
    min-width: 120px;
  }
  .conf-badge.visible { display: flex; }
  .conf-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .conf-val { font-size: 20px; font-family: 'Syne', sans-serif; font-weight: 600; color: var(--accent); }
  .conf-bar-bg { background: rgba(255,255,255,0.08); border-radius: 2px; height: 3px; overflow: hidden; }
  .conf-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* TEXT OUTPUT ROW */
  .text-output-row {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .current-letter-display {
    width: 60px;
    height: 60px;
    flex-shrink: 0;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: var(--accent);
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }
  .current-letter-display.pop {
    animation: letterPop 0.25s ease;
  }
  @keyframes letterPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); background: rgba(79,255,176,0.12); border-color: var(--accent); }
    100% { transform: scale(1); }
  }
  .current-letter-display::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(79,255,176,0.08), transparent);
    pointer-events: none;
  }

  .word-box {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 16px;
    min-height: 60px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  #wordDisplay {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #wordDisplay .cursor {
    display: inline-block;
    width: 2px;
    height: 1.4em;
    background: var(--accent);
    margin-left: 3px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section:last-child { border-bottom: none; flex: 1; overflow: hidden; }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 1rem;
  }

  /* CONTROLS */
  .control-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    transition: all 0.18s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
  .btn:active { transform: scale(0.97); }

  .btn.primary {
    background: var(--accent);
    color: #050709;
    border-color: var(--accent);
    font-weight: 600;
    grid-column: span 2;
  }
  .btn.primary:hover { background: #3aeea0; }

  .btn.danger { color: var(--danger); border-color: rgba(255,77,109,0.3); }
  .btn.danger:hover { background: rgba(255,77,109,0.1); }

  /* SENSITIVITY SLIDER */
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .slider-header span:first-child { font-size: 13px; color: var(--text); }
  .slider-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(79,255,176,0.1);
    padding: 2px 8px;
    border-radius: 4px;
  }

  input[type=range] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    background: var(--surface);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* SAVED PHRASES */
  .saved-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    max-height: 180px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .saved-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    animation: slideIn 0.2s ease;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .saved-item:hover { border-color: var(--border2); }
  .saved-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--danger); }
  .empty-saved {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 1rem 0;
    font-family: 'DM Mono', monospace;
  }

  @keyframes slideIn { from { opacity:0; transform: translateX(8px); } to { opacity:1; transform: translateX(0); } }

  /* ALPHABET REFERENCE */
  .alphabet-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .alpha-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 7px 0;
    color: var(--muted);
    transition: all 0.15s;
    cursor: default;
  }
  .alpha-cell.highlight {
    background: rgba(79,255,176,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .alpha-cell.space { font-size: 8px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* CAMERA SOURCE TOGGLE */
  .source-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
  }
  .source-tab {
    flex: 1;
    padding: 7px;
    border-radius: 7px;
    background: none;
    border: none;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .source-tab.active {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    backdrop-filter: blur(12px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
    .video-col { border-right: none; border-bottom: 1px solid var(--border); }
    .video-area { height: 55vw; min-height: 220px; }
    .sidebar { max-height: 60vh; overflow-y: auto; }
  }
</style>
</head>

<script>

  function loadModelFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      aslModel = JSON.parse(e.target.result);
      
      if (!aslModel.trees || !aslModel.classes) {
        throw new Error('Invalid model format');
      }
      
      document.getElementById('modelStatus').innerHTML = 
        `<span style="color:var(--accent)">✓ Loaded: ${aslModel.classes.length} letters, ${aslModel.trees.length} trees</span>`;
      
      showToast('ML model loaded! Recognition improved.');
    } catch (err) {
      showToast('Error: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsText(file);
}
let aslModel = null;
const DEFAULT_MODEL = null; // We'll set this after training
  function classifyASL(lms) {
  // If we have a trained model, use ML prediction
  if (aslModel && aslModel.trees) {
    return predictASL(lms);
  }
  
  // Fallback to old heuristic method
  return classifyASLHeuristic(lms);
}

// ML Prediction using Random Forest
function predictASL(landmarks) {
  // Extract features: 21 landmarks × 3 coords = 63 features
  // Normalize relative to wrist (landmark 0)
  const wrist = landmarks[0];
  const features = [];
  
  landmarks.forEach(lm => {
    features.push(lm.x - wrist.x);
    features.push(lm.y - wrist.y);
    features.push(lm.z - wrist.z);
  });
  
  // Get predictions from all trees
  const votes = {};
  for (const tree of aslModel.trees) {
    const pred = predictTree(tree, features);
    votes[pred] = (votes[pred] || 0) + 1;
  }
  
  // Find majority vote
  const totalVotes = aslModel.trees.length;
  let bestPred = null;
  let bestCount = 0;
  
  for (const [pred, count] of Object.entries(votes)) {
    if (count > bestCount) {
      bestCount = count;
      bestPred = parseInt(pred);
    }
  }
  
  const confidence = bestCount / totalVotes;
  
  // Only return if confidence is high enough
  if (confidence < 0.3) return null;
  
  const letter = aslModel.classes[bestPred];
  return { char: letter, conf: confidence };
}

function predictTree(node, features) {
  if (node.type === 'leaf') {
    return node.prediction;
  }
  
  if (features[node.feature] <= node.threshold) {
    return predictTree(node.left, features);
  } else {
    return predictTree(node.right, features);
  }
}
