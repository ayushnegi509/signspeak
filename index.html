<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignSpeak Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap');
  
  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #181e2e;
    --border: rgba(255,255,255,0.07);
    --accent: #4fffb0;
    --accent2: #00e5ff;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --danger: #ff4d6d;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  header {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,13,18,0.8);
  }
  
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
  }
  
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 400px;
    height: calc(100vh - 70px);
  }
  
  .video-section {
    position: relative;
    background: #050709;
  }
  
  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  
  #overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }
  
  .target-letter {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Syne', sans-serif;
    font-size: 150px;
    font-weight: 800;
    color: var(--accent);
    opacity: 0.2;
    pointer-events: none;
  }
  
  .controls {
    padding: 1.5rem;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow-y: auto;
  }
  
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 0.75rem;
  }
  
  .letter-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  
  .letter-btn {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  
  .letter-btn:hover { border-color: var(--accent); }
  .letter-btn.active { background: var(--accent); color: #050709; }
  .letter-btn.has-data { border-color: var(--accent); color: var(--accent); }
  
  .btn {
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
  }
  
  .btn:hover { background: rgba(255,255,255,0.06); }
  .btn.primary {
    background: var(--accent);
    color: #050709;
    font-weight: 600;
  }
  
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }
  
  input[type="file"] { display: none; }
  
  .stats-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
  }
  
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 12px 24px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .video-section { height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎯 SignSpeak <span style="color: var(--accent)">Trainer</span></div>
  <div style="color: var(--muted); font-size: 13px;">Train ASL Recognition Model</div>
</header>

<main>
  <div class="video-section">
    <video id="videoEl" autoplay muted playsinline></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="target-letter" id="targetLetter">A</div>
  </div>
  
  <div class="controls">
    <div>
      <div class="section-title">Select Letter</div>
      <div class="letter-grid" id="letterGrid"></div>
    </div>
    
    <div>
      <div class="section-title">Input Source</div>
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <button class="btn" onclick="useCamera()" style="flex: 1;">📷 Camera</button>
        <button class="btn" onclick="document.getElementById('videoFile').click()" style="flex: 1;">🎬 Video File</button>
        <input type="file" id="videoFile" accept="video/*" onchange="loadVideo(event)">
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="togglePlay()">⏯ Play</button>
        <button class="btn" onclick="stepFrame(-1)">⏮ Frame</button>
        <button class="btn" onclick="stepFrame(1)">Frame ⏭</button>
      </div>
    </div>
    
    <div>
      <div class="section-title">Capture</div>
      <button class="btn primary" id="captureBtn" onclick="captureBurst()" disabled>
        📸 Capture 10 Samples
      </button>
      <div style="margin-top: 8px; display: flex; gap: 8px;">
        <button class="btn" onclick="downloadDataset()" style="flex: 1;">💾 Save Data</button>
        <button class="btn" onclick="clearLetter()" style="flex: 1; color: var(--danger);">🗑 Clear</button>
      </div>
    </div>
    <div class="sidebar-section">
  <div class="section-label">ML Model</div>
  <input type="file" id="modelUpload" accept=".json" style="display:none" onchange="loadModel(event)">
  <button class="btn" onclick="document.getElementById('modelUpload').click()" style="width:100%">
    📁 Load Trained Model
  </button>
  <div id="modelStatus" style="font-size:11px;color:var(--muted);margin-top:8px;font-family:'DM Mono',monospace">
    Using rule-based detection
  </div>
</div>
    
    <div class="stats-box">
      <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span>Current Letter</span>
        <span id="currentCount" style="color: var(--accent);">0 samples</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span>Total Progress</span>
        <span id="totalCount" style="color: var(--accent2);">0/260</span>
      </div>
      <div class="progress-bar" style="margin-top: 8px;">
        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>
    
    <div style="margin-top: auto;">
      <button class="btn primary" onclick="trainAndExport()" style="background: var(--accent2);">
        🤖 Train Model & Export
      </button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const state = {
  currentLetter: 'A',
  dataset: {},
  handDetected: false,
  landmarks: null,
  isVideo: false,
  camera: null
};

const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const videoEl = document.getElementById('videoEl');
const canvas = document.getElementById('overlayCanvas');
const ctx = canvas.getContext('2d');

// Init letter grid
const grid = document.getElementById('letterGrid');
LETTERS.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'letter-btn';
  btn.textContent = l;
  btn.id = 'btn-'+l;
  btn.onclick = () => selectLetter(l);
  grid.appendChild(btn);
});

let hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5});
hands.onResults(onResults);

function onResults(results) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  
  if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
    state.handDetected = true;
    state.landmarks = results.multiHandLandmarks[0];
    drawLandmarks(state.landmarks, w, h);
    document.getElementById('captureBtn').disabled = false;
  } else {
    state.handDetected = false;
    state.landmarks = null;
    document.getElementById('captureBtn').disabled = true;
  }
}

function drawLandmarks(lms, w, h) {
  const pts = lms.map(p => ({x: p.x*w, y: p.y*h}));
  const conn = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  
  ctx.strokeStyle = 'rgba(79,255,176,0.6)';
  ctx.lineWidth = 2;
  conn.forEach(([a,b]) => {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  });
  
  pts.forEach((p,i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, i===0?8:4, 0, Math.PI*2);
    ctx.fillStyle = i===0?'#4fffb0':'#00e5ff';
    ctx.fill();
  });
}

async function useCamera() {
  state.isVideo = false;
  if (state.camera) state.camera.stop();
  
  const stream = await navigator.mediaDevices.getUserMedia({video: {width: 1280, height: 720}});
  videoEl.srcObject = stream;
  videoEl.src = '';
  await videoEl.play();
  
  canvas.width = videoEl.videoWidth;
  canvas.height = videoEl.videoHeight;
  
  state.camera = new Camera(videoEl, {
    onFrame: async () => await hands.send({image: videoEl}),
    width: 1280, height: 720
  });
  state.camera.start();
}

function loadVideo(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  if (state.camera) state.camera.stop();
  state.isVideo = true;
  
  videoEl.srcObject = null;
  videoEl.src = URL.createObjectURL(file);
  videoEl.play();
  videoEl.playbackRate = 0.5;
  
  const process = () => {
    if (videoEl.readyState >= 2) {
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
      hands.send({image: videoEl});
    }
    requestAnimationFrame(process);
  };
  process();
}

function togglePlay() { videoEl.paused ? videoEl.play() : videoEl.pause(); }
function stepFrame(d) { videoEl.pause(); videoEl.currentTime += d * (1/30); }

function selectLetter(l) {
  state.currentLetter = l;
  document.getElementById('targetLetter').textContent = l;
  document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+l).classList.add('active');
  updateStats();
}

async function captureBurst() {
  if (!state.landmarks) return;
  
  const btn = document.getElementById('captureBtn');
  btn.disabled = true;
  btn.textContent = 'Capturing...';
  
  if (!state.dataset[state.currentLetter]) state.dataset[state.currentLetter] = [];
  
  const startTime = videoEl.currentTime;
  
  for (let i = 0; i < 10; i++) {
    if (state.isVideo) {
      videoEl.currentTime = startTime + (i * 0.1);
      await new Promise(r => setTimeout(r, 100));
    } else {
      await new Promise(r => setTimeout(r, 200));
    }
    
    if (state.landmarks) {
      const wrist = state.landmarks[0];
      const features = [];
      state.landmarks.forEach(lm => {
        features.push(lm.x-wrist.x, lm.y-wrist.y, lm.z-wrist.z);
      });
      state.dataset[state.currentLetter].push(features);
    }
  }
  
  document.getElementById('btn-'+state.currentLetter).classList.add('has-data');
  updateStats();
  btn.disabled = false;
  btn.textContent = '📸 Capture 10 Samples';
  showToast(`Captured 10 samples for ${state.currentLetter}`);
}

function updateStats() {
  const curr = state.dataset[state.currentLetter]?.length || 0;
  const total = Object.values(state.dataset).reduce((a,b) => a+b.length, 0);
  
  document.getElementById('currentCount').textContent = curr + ' samples';
  document.getElementById('totalCount').textContent = total + '/260';
  document.getElementById('progressBar').style.width = Math.min((total/260)*100, 100) + '%';
}

function clearLetter() {
  delete state.dataset[state.currentLetter];
  document.getElementById('btn-'+state.currentLetter).classList.remove('has-data');
  updateStats();
}

function downloadDataset() {
  const data = JSON.stringify(state.dataset);
  const blob = new Blob([data], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'asl_dataset_'+Date.now()+'.json';
  a.click();
}

function trainAndExport() {
  const total = Object.values(state.dataset).reduce((a,b) => a+b.length, 0);
  if (total < 26) {
    showToast('Need at least 26 samples (1 per letter)');
    return;
  }
  
  showToast('Training... (takes 1-2 minutes)');
  
  // Prepare data
  const X = [], y = [];
  LETTERS.forEach((letter, idx) => {
    if (state.dataset[letter]) {
      state.dataset[letter].forEach(sample => {
        X.push(sample);
        y.push(idx);
      });
    }
  });
  
  // Train Random Forest
  const model = trainRF(X, y, 50);
  
  // Export
  const exportData = {
    type: 'random_forest',
    classes: LETTERS,
    trees: model.trees,
    featureCount: 63,
    created: new Date().toISOString()
  };
  
  const blob = new Blob([JSON.stringify(exportData)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'asl_model_'+Date.now()+'.json';
  a.click();
  
  showToast('Model trained and exported!');
}

function trainRF(X, y, nTrees=50) {
  const trees = [];
  for (let t = 0; t < nTrees; t++) {
    const samples = [];
    for (let i = 0; i < X.length; i++) samples.push(Math.floor(Math.random() * X.length));
    trees.push(buildTree(X, y, samples, X[0].length, 0, 10));
  }
  return {trees};
}

function buildTree(X, y, samples, nFeatures, depth, maxDepth) {
  const labels = samples.map(i => y[i]);
  const unique = [...new Set(labels)];
  
  if (unique.length === 1 || depth >= maxDepth || samples.length < 5) {
    const counts = {};
    labels.forEach(l => counts[l] = (counts[l]||0)+1);
    const majority = Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
    return {type: 'leaf', prediction: parseInt(majority)};
  }
  
  const featSubset = [];
  while (featSubset.length < Math.sqrt(nFeatures)) {
    const f = Math.floor(Math.random() * nFeatures);
    if (!featSubset.includes(f)) featSubset.push(f);
  }
  
  let bestGain = -1, bestFeat = null, bestThresh = null;
  
  for (const feat of featSubset) {
    const vals = samples.map(i => X[i][feat]).sort((a,b) => a-b);
    for (let i = 1; i < vals.length-1; i++) {
      const thresh = vals[i];
      const left = samples.filter(s => X[s][feat] <= thresh);
      const right = samples.filter(s => X[s][feat] > thresh);
      if (left.length === 0 || right.length === 0) continue;
      
      const gain = infoGain(labels, left.map(s => y[s]), right.map(s => y[s]));
      if (gain > bestGain) {
        bestGain = gain;
        bestFeat = feat;
        bestThresh = thresh;
      }
    }
  }
  
  if (bestFeat === null) {
    const counts = {};
    labels.forEach(l => counts[l] = (counts[l]||0)+1);
    return {type: 'leaf', prediction: parseInt(Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0])};
  }
  
  const leftS = samples.filter(s => X[s][bestFeat] <= bestThresh);
  const rightS = samples.filter(s => X[s][bestFeat] > bestThresh);
  
  return {
    type: 'split',
    feature: bestFeat,
    threshold: bestThresh,
    left: buildTree(X, y, leftS, nFeatures, depth+1, maxDepth),
    right: buildTree(X, y, rightS, nFeatures, depth+1, maxDepth)
  };
}

function infoGain(parent, left, right) {
  const p = entropy(parent);
  const n = parent.length;
  const c = (left.length/n) * entropy(left) + (right.length/n) * entropy(right);
  return p - c;
}

function entropy(labels) {
  const counts = {};
  labels.forEach(l => counts[l] = (counts[l]||0)+1);
  const n = labels.length;
  let e = 0;
  for (const c of Object.values(counts)) {
    const p = c/n;
    e -= p * Math.log2(p);
  }
  return e;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Start with camera
useCamera();
selectLetter('A');
</script>
</body>
</html>
