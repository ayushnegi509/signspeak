<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Permissions-Policy" content="camera=(self)">
<title>SignSpeak — ASL Recognition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #181e2e;
    --border: rgba(255,255,255,0.08);
    --accent: #4fffb0;
    --accent2: #00e5ff;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --danger: #ff4d6d;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,13,18,0.9);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 6px 12px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }

  .status-dot.active { 
    background: var(--accent); 
    box-shadow: 0 0 10px var(--accent);
  }

  .status-dot.error { 
    background: var(--danger); 
    box-shadow: 0 0 10px var(--danger);
  }

  /* Main Layout */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 360px;
    overflow: hidden;
  }

  /* Video Area */
  .video-container {
    position: relative;
    background: #050709;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: none;
  }

  #videoEl.active { display: block; }

  #overlayCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }

  .placeholder {
    position: absolute;
    text-align: center;
    color: var(--muted);
  }

  .placeholder-icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .start-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 16px 32px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
    transition: transform 0.2s;
  }

  .start-btn:hover { transform: scale(1.05); }

  /* Detection UI */
  .detection-pill {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10,13,18,0.9);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .detection-pill.visible { opacity: 1; }

  .confidence-panel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10,13,18,0.9);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: var(--radius);
    min-width: 140px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .confidence-panel.visible { opacity: 1; }

  .conf-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .conf-value {
    font-size: 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--accent);
  }

  .conf-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .conf-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* Output Bar */
  .output-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(17,21,32,0.95);
    border-top: 1px solid var(--border);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    backdrop-filter: blur(10px);
  }

  .current-char {
    width: 60px;
    height: 60px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .current-char.detected {
    border-color: var(--accent);
    background: rgba(79,255,176,0.1);
    animation: pulse 0.3s;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .text-display {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    min-height: 60px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.2em;
    background: var(--accent);
    margin-left: 4px;
    animation: blink 1s infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .panel {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
  }

  .btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover { 
    background: rgba(255,255,255,0.05); 
    border-color: rgba(255,255,255,0.2);
  }

  .btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn.primary:hover { background: #3aeea0; }

  .btn.active {
    background: var(--accent);
    color: #000;
  }

  .file-input { display: none; }

  .info-text {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* Alphabet Grid */
  .alphabet {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .alpha-cell {
    aspect-ratio: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
  }

  .alpha-cell.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .alpha-cell.predicted {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(79,255,176,0.2);
  }

  /* Saved Phrases */
  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .phrase-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .phrase-item:hover { border-color: var(--border); }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
  }

  .delete-btn:hover { color: var(--danger); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .sidebar { max-height: 40vh; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🤟</div>
    <div>Sign<span style="color: var(--accent)">Speak</span></div>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</header>

<main>
  <!-- Video Section -->
  <div class="video-container" id="videoContainer">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">📷</div>
      <div style="font-size: 18px; margin-bottom: 8px;">Camera is off</div>
      <div style="font-size: 14px; opacity: 0.7;">Click "Start Camera" to begin</div>
      <button class="start-btn" onclick="startCamera()">▶ Start Camera</button>
    </div>

    <video id="videoEl" autoplay muted playsinline></video>
    <canvas id="overlayCanvas"></canvas>

    <div class="detection-pill" id="detectionPill">
      <span style="color: var(--accent);">●</span>
      <span id="detectionText">Hand detected</span>
    </div>

    <div class="confidence-panel" id="confidencePanel">
      <div class="conf-label">Confidence</div>
      <div class="conf-value" id="confValue">—</div>
      <div class="conf-bar">
        <div class="conf-fill" id="confFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="output-bar">
      <div class="current-char" id="currentChar">—</div>
      <div class="text-display">
        <span id="outputText"></span><span class="cursor"></span>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Input Source -->
    <div class="panel">
      <div class="panel-title">Input Source</div>
      <button class="btn primary" onclick="startCamera()" id="camBtn">📷 Start Camera</button>
      <input type="file" id="videoUpload" class="file-input" accept="video/*" onchange="loadVideo(event)">
      <button class="btn" onclick="document.getElementById('videoUpload').click()">🎬 Upload Video</button>
      <div class="info-text" id="sourceInfo">Use camera or upload ASL video</div>
    </div>

    <!-- ML Model -->
    <div class="panel">
      <div class="panel-title">ML Model</div>
      <input type="file" id="modelUpload" class="file-input" accept=".json" onchange="loadModel(event)">
      <button class="btn" onclick="document.getElementById('modelUpload').click()">📁 Load Kaggle Model</button>
      <div class="info-text" id="modelInfo">
        Using basic detection.<br>
        Load trained model for 90%+ accuracy.
      </div>
    </div>

    <!-- Controls -->
    <div class="panel">
      <div class="panel-title">Text Controls</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <button class="btn" onclick="addSpace()">⎵ Space</button>
        <button class="btn" onclick="deleteChar()">⌫ Delete</button>
        <button class="btn" onclick="savePhrase()">💾 Save</button>
        <button class="btn" style="color: var(--danger);" onclick="clearText()">✕ Clear</button>
      </div>
      <button class="btn" onclick="exportText()" style="margin-top: 8px; border-color: var(--accent);">↓ Export Text</button>
    </div>

    <!-- Alphabet -->
    <div class="panel">
      <div class="panel-title">ASL Alphabet</div>
      <div class="alphabet" id="alphabetGrid"></div>
    </div>

    <!-- Saved -->
    <div class="panel" style="flex: 1;">
      <div class="panel-title">Saved Phrases</div>
      <div class="phrase-list" id="phraseList">
        <div class="info-text" style="text-align: center; padding: 20px;">No saved phrases</div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// State
const state = {
  isRunning: false,
  stream: null,
  mpCamera: null,
  aslModel: null,
  currentText: '',
  savedPhrases: JSON.parse(localStorage.getItem('signspeak_phrases') || '[]'),
  lastChar: null,
  holdFrames: 0,
  holdThreshold: 15, // ~0.5 seconds at 30fps
  isVideoFile: false
};

// DOM Elements
const videoEl = document.getElementById('videoEl');
const canvas = document.getElementById('overlayCanvas');
const ctx = canvas.getContext('2d');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const currentCharEl = document.getElementById('currentChar');
const outputTextEl = document.getElementById('outputText');

// Initialize Alphabet Grid
const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const grid = document.getElementById('alphabetGrid');
letters.forEach(l => {
  const cell = document.createElement('div');
  cell.className = 'alpha-cell';
  cell.textContent = l;
  cell.id = `alpha-${l}`;
  grid.appendChild(cell);
});

// Initialize MediaPipe
let hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

hands.onResults(onResults);

function onResults(results) {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
    const landmarks = results.multiHandLandmarks[0];
    drawLandmarks(landmarks, w, h);
    processDetection(landmarks);
  } else {
    document.getElementById('detectionPill').classList.remove('visible');
    document.getElementById('confidencePanel').classList.remove('visible');
    currentCharEl.textContent = '—';
    currentCharEl.classList.remove('predicted');
    highlightLetter(null);
  }
}

function drawLandmarks(lm, w, h) {
  const pts = lm.map(p => ({ x: p.x * w, y: p.y * h }));
  const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  
  ctx.strokeStyle = 'rgba(79,255,176,0.6)';
  ctx.lineWidth = 2;
  connections.forEach(([a,b]) => {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  });

  pts.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, i === 0 ? 6 : 3, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? '#4fffb0' : '#00e5ff';
    ctx.fill();
  });
}

// Classification
function processDetection(landmarks) {
  document.getElementById('detectionPill').classList.add('visible');
  
  const result = state.aslModel ? classifyWithModel(landmarks) : classifyHeuristic(landmarks);
  
  if (result) {
    document.getElementById('confidencePanel').classList.add('visible');
    document.getElementById('confValue').textContent = Math.round(result.conf * 100) + '%';
    document.getElementById('confFill').style.width = (result.conf * 100) + '%';
    
    currentCharEl.textContent = result.char;
    currentCharEl.classList.add('predicted');
    highlightLetter(result.char);
    
    // Type if held long enough
    if (result.char === state.lastChar) {
      state.holdFrames++;
      if (state.holdFrames >= state.holdThreshold) {
        addChar(result.char);
        state.holdFrames = 0;
        currentCharEl.classList.add('detected');
        setTimeout(() => currentCharEl.classList.remove('detected'), 300);
      }
    } else {
      state.lastChar = result.char;
      state.holdFrames = 0;
    }
  } else {
    document.getElementById('confidencePanel').classList.remove('visible');
    currentCharEl.textContent = '?';
    currentCharEl.classList.remove('predicted');
    state.lastChar = null;
    state.holdFrames = 0;
  }
}

function classifyWithModel(lm) {
  // Extract 63 features (normalized to wrist)
  const wrist = lm[0];
  const features = [];
  lm.forEach(p => {
    features.push(p.x - wrist.x, p.y - wrist.y, p.z - wrist.z);
  });

  // Vote across all trees
  const votes = {};
  state.aslModel.trees.forEach(tree => {
    const pred = traverseTree(tree, features);
    votes[pred] = (votes[pred] || 0) + 1;
  });

  // Find winner
  let best = null, max = 0;
  Object.entries(votes).forEach(([k, v]) => {
    if (v > max) { max = v; best = parseInt(k); }
  });

  const conf = max / state.aslModel.trees.length;
  if (conf < 0.3) return null;
  
  return { char: state.aslModel.classes[best], conf: conf };
}

function traverseTree(node, features) {
  if (node.type === 'leaf') return node.prediction;
  if (features[node.feature] <= node.threshold) {
    return traverseTree(node.left, features);
  }
  return traverseTree(node.right, features);
}

function classifyHeuristic(lm) {
  // Simple rule-based fallback
  const ext = (tip, pip) => lm[tip].y < lm[pip].y - 0.05;
  const curl = (tip, pip) => lm[tip].y > lm[pip].y;
  
  const i = ext(8,6), m = ext(12,10), r = ext(16,14), p = ext(20,18);
  const ic = curl(8,6), mc = curl(12,10), rc = curl(16,14), pc = curl(20,18);
  
  if (ic && mc && rc && pc) return {char:'A', conf:0.7};
  if (i && m && r && p) return {char:'B', conf:0.7};
  if (i && !m && !r && !p) return {char:'G', conf:0.6};
  if (i && m && !r && !p) return {char:'U', conf:0.6};
  if (!i && !m && !r && p) return {char:'I', conf:0.6};
  if (i && m && r && !p) return {char:'W', conf:0.6};
  
  return null;
}

function highlightLetter(char) {
  document.querySelectorAll('.alpha-cell').forEach(c => c.classList.remove('active'));
  if (char) {
    const el = document.getElementById(`alpha-${char}`);
    if (el) el.classList.add('active');
  }
}

// Camera Functions
async function startCamera() {
  try {
    showToast('Requesting camera access...');
    
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: 'user' }
    });
    
    state.stream = stream;
    videoEl.srcObject = stream;
    videoEl.classList.add('active');
    document.getElementById('placeholder').style.display = 'none';
    
    await videoEl.play();
    
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    
    // Start MediaPipe
    state.mpCamera = new Camera(videoEl, {
      onFrame: async () => {
        await hands.send({ image: videoEl });
      },
      width: 1280,
      height: 720
    });
    
    state.mpCamera.start();
    state.isRunning = true;
    state.isVideoFile = false;
    
    // Update UI
    document.getElementById('camBtn').textContent = '⏹ Stop Camera';
    document.getElementById('camBtn').classList.add('active');
    document.getElementById('sourceInfo').textContent = 'Camera active';
    statusDot.classList.add('active');
    statusText.textContent = 'Camera on';
    
    showToast('Camera started! Show your hand.');
    
  } catch (err) {
    console.error(err);
    statusDot.classList.add('error');
    statusText.textContent = 'Error';
    showToast('Camera error: ' + err.message);
    alert('Camera access failed. Make sure you:\n1. Are on HTTPS (not file://)\n2. Allowed camera permissions\n3. Have a camera connected');
  }
}

function stopCamera() {
  if (state.mpCamera) {
    state.mpCamera.stop();
    state.mpCamera = null;
  }
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
  
  videoEl.srcObject = null;
  videoEl.classList.remove('active');
  document.getElementById('placeholder').style.display = 'flex';
  
  state.isRunning = false;
  
  document.getElementById('camBtn').textContent = '📷 Start Camera';
  document.getElementById('camBtn').classList.remove('active');
  document.getElementById('sourceInfo').textContent = 'Use camera or upload ASL video';
  statusDot.classList.remove('active');
  statusText.textContent = 'Ready';
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Video File
function loadVideo(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  stopCamera();
  
  const url = URL.createObjectURL(file);
  videoEl.src = url;
  videoEl.classList.add('active');
  videoEl.playbackRate = 0.5;
  videoEl.play();
  
  document.getElementById('placeholder').style.display = 'none';
  state.isVideoFile = true;
  
  const process = async () => {
    if (!state.isVideoFile || videoEl.paused) return;
    if (videoEl.readyState >= 2) {
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
      await hands.send({ image: videoEl });
    }
    requestAnimationFrame(process);
  };
  process();
  
  document.getElementById('sourceInfo').textContent = 'Video: ' + file.name;
  showToast('Video loaded! Use video controls to navigate');
}

// Model Loading
function loadModel(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const model = JSON.parse(event.target.result);
      
      if (!model.trees || !model.classes) {
        throw new Error('Invalid model format');
      }
      
      state.aslModel = model;
      
      document.getElementById('modelInfo').innerHTML = 
        `<span style="color: var(--accent);">✓ Model loaded: ${model.classes.length} letters<br>Accuracy: ${(model.accuracy * 100).toFixed(0)}%</span>`;
      
      showToast('Kaggle model loaded! Recognition improved.');
      
    } catch (err) {
      showToast('Error: ' + err.message);
      alert('Failed to load model. Make sure it\'s the correct JSON file from training.');
    }
  };
  reader.readAsText(file);
}

// Text Functions
function addChar(char) {
  state.currentText += char;
  outputTextEl.textContent = state.currentText;
}

function addSpace() {
  state.currentText += ' ';
  outputTextEl.textContent = state.currentText;
}

function deleteChar() {
  state.currentText = state.currentText.slice(0, -1);
  outputTextEl.textContent = state.currentText;
}

function clearText() {
  state.currentText = '';
  outputTextEl.textContent = '';
  showToast('Text cleared');
}

function savePhrase() {
  const text = state.currentText.trim();
  if (!text) {
    showToast('Nothing to save');
    return;
  }
  
  state.savedPhrases.unshift(text);
  if (state.savedPhrases.length > 10) state.savedPhrases.pop();
  
  localStorage.setItem('signspeak_phrases', JSON.stringify(state.savedPhrases));
  renderPhrases();
  showToast('Phrase saved!');
}

function renderPhrases() {
  const list = document.getElementById('phraseList');
  if (state.savedPhrases.length === 0) {
    list.innerHTML = '<div class="info-text" style="text-align: center; padding: 20px;">No saved phrases</div>';
    return;
  }
  
  list.innerHTML = '';
  state.savedPhrases.forEach((phrase, i) => {
    const item = document.createElement('div');
    item.className = 'phrase-item';
    item.innerHTML = `
      <span onclick="loadPhrase('${phrase.replace(/'/g, "\\'")}')" style="flex: 1; overflow: hidden; text-overflow: ellipsis;">${phrase}</span>
      <button class="delete-btn" onclick="deletePhrase(${i})">✕</button>
    `;
    list.appendChild(item);
  });
}

function loadPhrase(text) {
  state.currentText = text;
  outputTextEl.textContent = text;
}

function deletePhrase(i) {
  state.savedPhrases.splice(i, 1);
  localStorage.setItem('signspeak_phrases', JSON.stringify(state.savedPhrases));
  renderPhrases();
}

function exportText() {
  const text = state.currentText.trim();
  if (!text) {
    showToast('Nothing to export');
    return;
  }
  
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'signspeak_' + Date.now() + '.txt';
  a.click();
  showToast('Text exported!');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Init
renderPhrases();

// Handle page visibility
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state.isRunning && !state.isVideoFile) {
    // Optional: pause when tab hidden
  }
});
</script>
