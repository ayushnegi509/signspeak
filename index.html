<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignSpeak — Real-Time Sign Language Recognition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #181e2e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #4fffb0;
    --accent2: #00e5ff;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --danger: #ff4d6d;
    --warn: #ffb347;
    --radius: 16px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(ellipse, rgba(79,255,176,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(ellipse, rgba(0,229,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(10,13,18,0.8);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .logo-text span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.detecting { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 1.2s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* MAIN LAYOUT */
  main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    height: calc(100vh - 68px);
  }

  /* VIDEO COLUMN */
  .video-col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .video-area {
    flex: 1;
    position: relative;
    background: #050709;
    overflow: hidden;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  #overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }

  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: radial-gradient(ellipse at center, #0d1220 0%, #050709 100%);
  }
  .video-placeholder .icon { font-size: 48px; opacity: 0.3; }
  .video-placeholder p {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    max-width: 200px;
    line-height: 1.6;
  }

  /* Detection badge overlay */
  .detect-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(10,13,18,0.85);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    backdrop-filter: blur(8px);
    display: none;
  }
  .detect-badge.visible { display: flex; align-items: center; gap: 8px; }

  /* Confidence meter */
  .conf-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(10,13,18,0.85);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    gap: 4px;
    min-width: 120px;
  }
  .conf-badge.visible { display: flex; }
  .conf-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .conf-val { font-size: 20px; font-family: 'Syne', sans-serif; font-weight: 600; color: var(--accent); }
  .conf-bar-bg { background: rgba(255,255,255,0.08); border-radius: 2px; height: 3px; overflow: hidden; }
  .conf-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* TEXT OUTPUT ROW */
  .text-output-row {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .current-letter-display {
    width: 60px;
    height: 60px;
    flex-shrink: 0;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: var(--accent);
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }
  .current-letter-display.pop {
    animation: letterPop 0.25s ease;
  }
  @keyframes letterPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); background: rgba(79,255,176,0.12); border-color: var(--accent); }
    100% { transform: scale(1); }
  }
  .current-letter-display::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(79,255,176,0.08), transparent);
    pointer-events: none;
  }

  .word-box {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 16px;
    min-height: 60px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  #wordDisplay {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #wordDisplay .cursor {
    display: inline-block;
    width: 2px;
    height: 1.4em;
    background: var(--accent);
    margin-left: 3px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section:last-child { border-bottom: none; flex: 1; overflow: hidden; }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 1rem;
  }

  /* CONTROLS */
  .control-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    transition: all 0.18s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
  .btn:active { transform: scale(0.97); }

  .btn.primary {
    background: var(--accent);
    color: #050709;
    border-color: var(--accent);
    font-weight: 600;
    grid-column: span 2;
  }
  .btn.primary:hover { background: #3aeea0; }

  .btn.danger { color: var(--danger); border-color: rgba(255,77,109,0.3); }
  .btn.danger:hover { background: rgba(255,77,109,0.1); }

  /* SENSITIVITY SLIDER */
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .slider-header span:first-child { font-size: 13px; color: var(--text); }
  .slider-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(79,255,176,0.1);
    padding: 2px 8px;
    border-radius: 4px;
  }

  input[type=range] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    background: var(--surface);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* SAVED PHRASES */
  .saved-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    max-height: 180px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .saved-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    animation: slideIn 0.2s ease;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .saved-item:hover { border-color: var(--border2); }
  .saved-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--danger); }
  .empty-saved {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 1rem 0;
    font-family: 'DM Mono', monospace;
  }

  @keyframes slideIn { from { opacity:0; transform: translateX(8px); } to { opacity:1; transform: translateX(0); } }

  /* ALPHABET REFERENCE */
  .alphabet-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .alpha-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 7px 0;
    color: var(--muted);
    transition: all 0.15s;
    cursor: default;
  }
  .alpha-cell.highlight {
    background: rgba(79,255,176,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .alpha-cell.space { font-size: 8px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* CAMERA SOURCE TOGGLE */
  .source-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
  }
  .source-tab {
    flex: 1;
    padding: 7px;
    border-radius: 7px;
    background: none;
    border: none;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .source-tab.active {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    backdrop-filter: blur(12px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
    .video-col { border-right: none; border-bottom: 1px solid var(--border); }
    .video-area { height: 55vw; min-height: 220px; }
    .sidebar { max-height: 60vh; overflow-y: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤟</div>
    <div class="logo-text">Sign<span>Speak</span></div>
  </div>
  <div id="statusPill" class="status-pill">
    <div id="statusDot" class="status-dot"></div>
    <span id="statusText">Camera off</span>
  </div>
</header>

<main>
  <!-- VIDEO COLUMN -->
  <div class="video-col">
    <div class="video-area" id="videoArea">
      <div class="video-placeholder" id="placeholder">
        <div class="icon">📷</div>
        <p>Start the camera to begin sign language recognition</p>
      </div>
      <video id="videoEl" autoplay muted playsinline></video>
      <canvas id="overlayCanvas"></canvas>

      <div class="detect-badge visible" id="detectBadge">
        <div class="status-dot detecting"></div>
        <span id="detectText">Scanning for hand…</span>
      </div>

      <div class="conf-badge" id="confBadge">
        <div class="conf-label">Confidence</div>
        <div class="conf-val" id="confVal">—</div>
        <div class="conf-bar-bg"><div class="conf-bar" id="confBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="text-output-row">
      <div class="current-letter-display" id="currentLetter">—</div>
      <div class="word-box">
        <div id="wordDisplay"><span id="wordText"></span><span class="cursor"></span></div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Camera source -->
    <div class="sidebar-section">
      <div class="section-label">Camera Source</div>
      <div class="source-tabs">
        <button class="source-tab active" id="tabWebcam" onclick="selectSource('user')">💻 Webcam</button>
        <button class="source-tab" id="tabBT" onclick="selectSource('environment')">📱 Phone/BT</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="sidebar-section">
      <div class="section-label">Controls</div>
      <div class="control-grid">
        <button class="btn primary" id="startBtn" onclick="toggleCamera()">▶ Start Camera</button>
        <button class="btn" onclick="addSpace()" title="Add space between words">⎵ Space</button>
        <button class="btn" onclick="deleteLast()" title="Delete last character">⌫ Delete</button>
        <button class="btn" onclick="savePhrase()" title="Save phrase">💾 Save</button>
        <button class="btn" onclick="clearAll()" title="Clear text">✕ Clear</button>
        <button class="btn danger" onclick="exportTxt()" title="Export">↓ Export</button>
      </div>
    </div>

    <!-- Hold sensitivity -->
    <div class="sidebar-section">
      <div class="section-label">Recognition</div>
      <div class="slider-row">
        <div class="slider-header">
          <span>Hold duration</span>
          <span class="slider-val" id="holdVal">1.2s</span>
        </div>
        <input type="range" min="5" max="30" value="12" id="holdSlider" oninput="updateHold(this.value)">
      </div>
      <div style="height: 10px;"></div>
      <div class="slider-row">
        <div class="slider-header">
          <span>Hand scale</span>
          <span class="slider-val" id="scaleVal">1.0×</span>
        </div>
        <input type="range" min="5" max="20" value="10" id="scaleSlider" oninput="updateScale(this.value)">
      </div>
    </div>

    <!-- Alphabet reference -->
    <div class="sidebar-section">
      <div class="section-label">ASL Alphabet</div>
      <div class="alphabet-grid" id="alphaGrid"></div>
    </div>

    <!-- Saved phrases -->
    <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <div class="section-label">Saved Phrases</div>
      <div class="saved-list" id="savedList">
        <div class="empty-saved" id="emptyMsg">No saved phrases yet</div>
      </div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
  // More precise finger detection
function isFingerExtended(tip, pip, wrist) {
  // Check if tip is farther from wrist than pip
  const tipDist = Math.hypot(lms[tip].x - lms[wrist].x, lms[tip].y - lms[wrist].y);
  const pipDist = Math.hypot(lms[pip].x - lms[wrist].x, lms[pip].y - lms[wrist].y);
  return tipDist > pipDist;
}

// Check if fingers are touching
function areFingersTouching(tip1, tip2, threshold = 0.05) {
  return dist(tip1, tip2) < threshold;
}
const state = {
  cameraRunning: false,
  currentChar: null,
  holdFrames: 0,
  holdThreshold: 12,
  wordText: '',
  lastChar: null,
  savedPhrases: JSON.parse(localStorage.getItem('signspeak_saved') || '[]'),
  cameraFacing: 'user',
  handVisible: false,
  stream: null,
  mpCamera: null,
};

const ASL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').concat(['SPC']);

// ─── UI REFS ──────────────────────────────────────────────────────────────────
const videoEl = document.getElementById('videoEl');
const overlayCanvas = document.getElementById('overlayCanvas');
const ctx = overlayCanvas.getContext('2d');
const placeholder = document.getElementById('placeholder');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const startBtn = document.getElementById('startBtn');
const detectBadge = document.getElementById('detectBadge');
const detectText = document.getElementById('detectText');
const confBadge = document.getElementById('confBadge');
const confVal = document.getElementById('confVal');
const confBar = document.getElementById('confBar');
const currentLetterEl = document.getElementById('currentLetter');
const wordTextEl = document.getElementById('wordText');

// ─── ALPHABET GRID ────────────────────────────────────────────────────────────
const alphaGrid = document.getElementById('alphaGrid');
ASL_LETTERS.forEach(l => {
  const cell = document.createElement('div');
  cell.className = 'alpha-cell' + (l === 'SPC' ? ' space' : '');
  cell.textContent = l === 'SPC' ? 'SPC' : l;
  cell.id = 'alpha_' + l;
  alphaGrid.appendChild(cell);
});

function highlightAlpha(char) {
  document.querySelectorAll('.alpha-cell').forEach(c => c.classList.remove('highlight'));
  if (char) {
    const key = char === ' ' ? 'SPC' : char.toUpperCase();
    const el = document.getElementById('alpha_' + key);
    if (el) el.classList.add('highlight');
  }
}

// ─── SAVED PHRASES ─────────────────────────────────────────────────────────
function renderSaved() {
  const list = document.getElementById('savedList');
  const empty = document.getElementById('emptyMsg');
  list.innerHTML = '';
  if (state.savedPhrases.length === 0) {
    list.appendChild(empty || (() => {
      const d = document.createElement('div');
      d.className = 'empty-saved';
      d.id = 'emptyMsg';
      d.textContent = 'No saved phrases yet';
      return d;
    })());
    return;
  }
  state.savedPhrases.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'saved-item';
    item.innerHTML = `<span title="${p}">${p}</span><button class="del-btn" onclick="deletePhrase(${i})">✕</button>`;
    item.querySelector('span').onclick = () => { state.wordText = p; renderWord(); };
    list.appendChild(item);
  });
}

function savePhrase() {
  const txt = state.wordText.trim();
  if (!txt) { showToast('Nothing to save'); return; }
  state.savedPhrases.unshift(txt);
  if (state.savedPhrases.length > 20) state.savedPhrases.pop();
  localStorage.setItem('signspeak_saved', JSON.stringify(state.savedPhrases));
  renderSaved();
  showToast('Phrase saved!');
}

function deletePhrase(i) {
  state.savedPhrases.splice(i, 1);
  localStorage.setItem('signspeak_saved', JSON.stringify(state.savedPhrases));
  renderSaved();
}

renderSaved();

// ─── TEXT CONTROLS ────────────────────────────────────────────────────────────
function renderWord() {
  wordTextEl.textContent = state.wordText;
}

function appendChar(char) {
  state.wordText += char;
  renderWord();
  // pop animation
  currentLetterEl.classList.remove('pop');
  void currentLetterEl.offsetWidth;
  currentLetterEl.classList.add('pop');
}

function addSpace() { appendChar(' '); }
function deleteLast() { state.wordText = state.wordText.slice(0, -1); renderWord(); }
function clearAll() { state.wordText = ''; renderWord(); showToast('Cleared'); }

function exportTxt() {
  const txt = state.wordText.trim();
  if (!txt) { showToast('Nothing to export'); return; }
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'signspeak_' + Date.now() + '.txt';
  a.click();
  showToast('Exported!');
}

// ─── SLIDERS ──────────────────────────────────────────────────────────────────
function updateHold(v) {
  state.holdThreshold = parseInt(v);
  document.getElementById('holdVal').textContent = (v / 10).toFixed(1) + 's';
}
function updateScale(v) {
  document.getElementById('scaleVal').textContent = (v / 10).toFixed(1) + '×';
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── CAMERA SOURCE ────────────────────────────────────────────────────────────
function selectSource(facing) {
  state.cameraFacing = facing;
  document.getElementById('tabWebcam').classList.toggle('active', facing === 'user');
  document.getElementById('tabBT').classList.toggle('active', facing === 'environment');
  if (state.cameraRunning) {
    stopCamera();
    setTimeout(startCamera, 300);
  }
}

// ─── MEDIAPIPE HANDS ──────────────────────────────────────────────────────────
let hands;

function initHands() {
  hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6,
  });
  hands.onResults(onHandResults);
}

// ─── HAND LANDMARK DRAWING ────────────────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];

function drawLandmarks(lms, w, h) {
  ctx.clearRect(0, 0, w, h);
  if (!lms || lms.length === 0) return;

  const pts = lms.map(p => ({ x: p.x * w, y: p.y * h }));

  // Draw bones
  ctx.strokeStyle = 'rgba(0,229,255,0.55)';
  ctx.lineWidth = 2;
  CONNECTIONS.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  });

  // Draw joints
  pts.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, i === 0 ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? '#4fffb0' : 'rgba(0,229,255,0.9)';
    ctx.fill();
  });
}

// ─── SIMPLE ASL CLASSIFIER ────────────────────────────────────────────────────
// Heuristic-based: uses normalized landmark geometry
function classifyASL(lms) {
  if (!lms || lms.length < 21) return null;

  // Helper: normalized distance
  function dist(a, b) {
    return Math.hypot(lms[a].x - lms[b].x, lms[a].y - lms[b].y);
  }
  function angle(a, b, c) {
    const ax = lms[a].x - lms[b].x, ay = lms[a].y - lms[b].y;
    const cx = lms[c].x - lms[b].x, cy = lms[c].y - lms[b].y;
    const dot = ax * cx + ay * cy;
    const mag = Math.hypot(ax, ay) * Math.hypot(cx, cy);
    return Math.acos(Math.max(-1, Math.min(1, dot / (mag || 1)))) * (180 / Math.PI);
  }

  // Finger extended: tip significantly above pip (lower y = higher on screen)
  function fingerExtended(tip, pip) { return lms[tip].y < lms[pip].y - 0.03; }
  function fingerCurled(tip, pip) { return lms[tip].y > lms[pip].y + 0.01; }

  // Thumb: compare x to metacarpal
  const thumbExtR = lms[4].x > lms[3].x + 0.03;
  const thumbExtL = lms[4].x < lms[3].x - 0.03;
  const thumbUp = lms[4].y < lms[3].y - 0.03;

  const indexExt = fingerExtended(8, 6);
  const middleExt = fingerExtended(12, 10);
  const ringExt = fingerExtended(16, 14);
  const pinkyExt = fingerExtended(20, 18);

  const indexCurl = fingerCurled(8, 6);
  const middleCurl = fingerCurled(12, 10);
  const ringCurl = fingerCurled(16, 14);
  const pinkyCurl = fingerCurled(20, 18);

  // Fingertip spread: distance between index and middle tip
  const imSpread = dist(8, 12);
  const imrpSpread = dist(8, 20);

  // Simple rule-based mapping (heuristic approximation):
  const allExt = indexExt && middleExt && ringExt && pinkyExt;
  const allCurl = indexCurl && middleCurl && ringCurl && pinkyCurl;

  if (allCurl && !thumbExtR && !thumbExtL) return { char: 'A', conf: 0.82 };
  if (allExt && (thumbExtR || thumbExtL)) return { char: 'B', conf: 0.78 };
  if (allCurl && !indexCurl) return { char: 'D', conf: 0.70 };
  if (!indexExt && !middleExt && !ringExt && !pinkyExt && (thumbExtR || thumbExtL)) return { char: 'A', conf: 0.75 };
  if (indexExt && !middleExt && !ringExt && !pinkyExt) return { char: 'G', conf: 0.72 };
  if (indexExt && middleExt && !ringExt && !pinkyExt && imSpread < 0.06) return { char: 'U', conf: 0.74 };
  if (indexExt && middleExt && !ringExt && !pinkyExt && imSpread > 0.07) return { char: 'V', conf: 0.76 };
  if (indexExt && middleExt && ringExt && !pinkyExt) return { char: 'W', conf: 0.74 };
  if (allExt && !thumbExtR && !thumbExtL) return { char: 'B', conf: 0.71 };
  if (!indexExt && middleExt && !ringExt && !pinkyExt) return { char: 'H', conf: 0.68 };
  if (pinkyExt && !indexExt && !middleExt && !ringExt) return { char: 'I', conf: 0.74 };
  if (pinkyExt && indexExt && !middleExt && !ringExt && (thumbExtR || thumbExtL)) return { char: 'Y', conf: 0.76 };
  if (pinkyExt && indexExt && !middleExt && !ringExt) return { char: 'I', conf: 0.70 };
  if (thumbUp && allCurl) return { char: 'A', conf: 0.73 };

  // O shape: all tips close together
  const tipCluster = dist(8, 4) < 0.1 && dist(12, 4) < 0.12;
  if (tipCluster) return { char: 'O', conf: 0.72 };

  // L shape
  if (indexExt && thumbExtR && !middleExt && !ringExt && !pinkyExt) return { char: 'L', conf: 0.80 };
  if (indexExt && thumbExtL && !middleExt && !ringExt && !pinkyExt) return { char: 'L', conf: 0.80 };

  // C - Curved hand (fingers curved, open palm, thumb away)
const fingersCurled = indexCurl && middleCurl && ringCurl && pinkyCurl;
const thumbOpen = dist(4, 17) > 0.15; // Thumb away from pinky base
if (fingersCurled && thumbOpen && lms[8].x > lms[5].x) {
  return { char: 'C', conf: 0.75 };
}

// E - Fingers curled tight, thumb across palm
if (fingersCurled && (thumbExtR || thumbExtL) && dist(4, 9) < 0.08) {
  return { char: 'E', conf: 0.72 };
}

// F - Index touches thumb, others extended
if (indexCurl && middleExt && ringExt && pinkyExt && dist(4, 8) < 0.05) {
  return { char: 'F', conf: 0.78 };
}

// K - Index and middle up in V, thumb up between them
if (indexExt && middleExt && ringCurl && pinkyCurl && thumbUp && lms[4].y < lms[10].y) {
  return { char: 'K', conf: 0.74 };
}

// M - All fingers curled over thumb
if (fingersCurled && !thumbUp && dist(12, 2) < 0.1) {
  return { char: 'M', conf: 0.70 };
}

// N - Similar to M but different thumb position
if (fingersCurled && !thumbUp && dist(12, 2) > 0.08 && dist(12, 2) < 0.15) {
  return { char: 'N', conf: 0.70 };
}

// P - Index down, middle up, thumb up (K rotated down)
if (!indexExt && middleExt && ringCurl && pinkyCurl && lms[8].y > lms[5].y) {
  return { char: 'P', conf: 0.73 };
}

// Q - Thumb and index pinch, pointing down
if (indexCurl && !thumbUp && lms[8].y > lms[0].y && dist(4, 8) < 0.06) {
  return { char: 'Q', conf: 0.71 };
}

// R - Crossed fingers (index over middle)
if (indexExt && middleExt && ringCurl && pinkyCurl && lms[8].x < lms[12].x) {
  return { char: 'R', conf: 0.76 };
}

// S - Fist with thumb over fingers (all curled)
if (fingersCurled && !thumbUp && dist(4, 9) < 0.1 && dist(4, 5) < 0.1) {
  return { char: 'S', conf: 0.74 };
}

// T - Thumb between index and middle
if (fingersCurled && !thumbUp && lms[4].x > lms[5].x && lms[4].x < lms[9].x) {
  return { char: 'T', conf: 0.72 };
}

// X - Index bent, others curled
if (!indexExt && !indexCurl && middleCurl && ringCurl && pinkyCurl) {
  return { char: 'X', conf: 0.73 };
}

  return null;
}

// ─── HAND RESULTS CALLBACK ────────────────────────────────────────────────────
function onHandResults(results) {
  const w = overlayCanvas.width, h = overlayCanvas.height;
  ctx.clearRect(0, 0, w, h);

  const lms = results.multiHandLandmarks?.[0];
  state.handVisible = !!lms;

  if (lms) {
    drawLandmarks(lms, w, h);
    detectText.textContent = 'Hand detected';
    detectBadge.innerHTML = '<div class="status-dot active" style="background:var(--accent);box-shadow:0 0 6px var(--accent)"></div><span>Hand detected</span>';

    const result = classifyASL(lms);
    if (result) {
      confBadge.classList.add('visible');
      const pct = Math.round(result.conf * 100);
      confVal.textContent = pct + '%';
      confBar.style.width = pct + '%';

      currentLetterEl.textContent = result.char;
      highlightAlpha(result.char);
      setStatus('detecting', 'Recognizing…');

      if (result.char === state.lastChar) {
        state.holdFrames++;
        if (state.holdFrames === state.holdThreshold) {
          appendChar(result.char);
          state.holdFrames = 0;
        }
      } else {
        state.lastChar = result.char;
        state.holdFrames = 0;
      }
    } else {
      confBadge.classList.remove('visible');
      currentLetterEl.textContent = '?';
      highlightAlpha(null);
      state.lastChar = null;
      state.holdFrames = 0;
    }
  } else {
    detectBadge.innerHTML = '<div class="status-dot detecting"></div><span>Scanning for hand…</span>';
    confBadge.classList.remove('visible');
    currentLetterEl.textContent = '—';
    highlightAlpha(null);
    setStatus('active', 'Camera on');
    state.lastChar = null;
    state.holdFrames = 0;
  }
}

// ─── CAMERA ───────────────────────────────────────────────────────────────────
function setStatus(type, text) {
  statusDot.className = 'status-dot' + (type ? ' ' + type : '');
  statusText.textContent = text;
}

async function startCamera() {
  try {
    const constraints = {
      video: {
        facingMode: state.cameraFacing,
        width: { ideal: 1280 },
        height: { ideal: 720 },
      }
    };
    state.stream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject = state.stream;
    await videoEl.play();

    placeholder.style.display = 'none';
    detectBadge.classList.add('visible');

    // Resize canvas to match video
    videoEl.onloadedmetadata = () => {
      overlayCanvas.width = videoEl.videoWidth;
      overlayCanvas.height = videoEl.videoHeight;
    };

    if (!hands) initHands();

    // Use MediaPipe Camera
    state.mpCamera = new Camera(videoEl, {
      onFrame: async () => {
        if (overlayCanvas.width !== videoEl.videoWidth) {
          overlayCanvas.width = videoEl.videoWidth;
          overlayCanvas.height = videoEl.videoHeight;
        }
        await hands.send({ image: videoEl });
      },
      width: 1280,
      height: 720,
    });
    state.mpCamera.start();

    state.cameraRunning = true;
    startBtn.textContent = '⏹ Stop Camera';
    startBtn.style.background = 'rgba(255,77,109,0.2)';
    startBtn.style.borderColor = 'var(--danger)';
    startBtn.style.color = 'var(--danger)';
    setStatus('active', 'Camera on');
  } catch (e) {
    showToast('Camera error: ' + (e.message || 'Permission denied'));
    setStatus('', 'Camera error');
  }
}

function stopCamera() {
  if (state.mpCamera) { state.mpCamera.stop(); state.mpCamera = null; }
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
  videoEl.srcObject = null;
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  placeholder.style.display = 'flex';
  detectBadge.classList.remove('visible');
  confBadge.classList.remove('visible');
  currentLetterEl.textContent = '—';
  highlightAlpha(null);

  state.cameraRunning = false;
  startBtn.textContent = '▶ Start Camera';
  startBtn.style.background = 'var(--accent)';
  startBtn.style.borderColor = 'var(--accent)';
  startBtn.style.color = '#050709';
  setStatus('', 'Camera off');
}

function toggleCamera() {
  state.cameraRunning ? stopCamera() : startCamera();
}
</script>
