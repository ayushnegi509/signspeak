<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignSpeak Trainer — Collect ASL Data</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #181e2e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #4fffb0;
    --accent2: #00e5ff;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --danger: #ff4d6d;
    --warn: #ffb347;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,13,18,0.8);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 0;
    height: calc(100vh - 70px);
  }

  .video-section {
    position: relative;
    background: #050709;
    display: flex;
    flex-direction: column;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }

  .target-letter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Syne', sans-serif;
    font-size: 180px;
    font-weight: 800;
    color: var(--accent);
    opacity: 0.15;
    pointer-events: none;
    text-shadow: 0 0 60px var(--accent);
  }

  .controls-section {
    padding: 1.5rem;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow-y: auto;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 0.75rem;
  }

  .letter-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .letter-btn {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .letter-btn:hover {
    border-color: var(--border2);
    background: rgba(255,255,255,0.05);
  }

  .letter-btn.active {
    background: var(--accent);
    color: #050709;
    border-color: var(--accent);
  }

  .letter-btn.has-data {
    border-color: var(--accent);
    color: var(--accent);
  }

  .capture-controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover {
    background: rgba(255,255,255,0.06);
  }

  .btn.primary {
    background: var(--accent);
    color: #050709;
    border-color: var(--accent);
    font-weight: 600;
    font-size: 16px;
    padding: 18px;
  }

  .btn.primary:hover {
    background: #3aeea0;
    transform: scale(1.02);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .stats-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .stat-row:last-child {
    margin-bottom: 0;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-weight: 600;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .preview-data {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(0,0,0,0.3);
    padding: 12px;
    border-radius: 8px;
    max-height: 150px;
    overflow-y: auto;
    word-break: break-all;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 12px 24px;
    font-size: 14px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Syne', sans-serif;
    font-size: 120px;
    font-weight: 800;
    color: var(--accent2);
    text-shadow: 0 0 40px var(--accent2);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .countdown.active {
    opacity: 1;
  }

  .actions {
    display: flex;
    gap: 8px;
  }

  .actions .btn {
    flex: 1;
  }

  .btn.danger {
    color: var(--danger);
    border-color: rgba(255,77,109,0.3);
  }

  .btn.danger:hover {
    background: rgba(255,77,109,0.1);
  }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .video-section { height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎯</div>
    <div class="logo-text">SignSpeak <span style="color: var(--accent)">Trainer</span></div>
  </div>
  <div style="color: var(--muted); font-size: 13px;">
    Collect training data for ML model
  </div>
</header>

<main>
  <div class="video-section">
    <video id="videoEl" autoplay muted playsinline></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="target-letter" id="targetLetter">A</div>
    <div class="countdown" id="countdown">3</div>
  </div>

  <div class="controls-section">
    <div>
      <div class="section-title">Select Letter</div>
      <div class="letter-grid" id="letterGrid"></div>
    </div>

    <div class="capture-controls">
      <div class="section-title">Capture Samples</div>
      <button class="btn primary" id="captureBtn" onclick="startCapture()" disabled>
        📸 Capture 10 Samples
      </button>
      <div class="actions">
        <button class="btn" onclick="downloadDataset()">💾 Save Dataset</button>
        <button class="btn danger" onclick="clearCurrent()">🗑 Clear Letter</button>
      </div>
    </div>

    <div class="stats-box">
      <div class="section-title">Dataset Statistics</div>
      <div class="stat-row">
        <span>Current Letter</span>
        <span id="currentCount" style="color: var(--accent); font-weight: 600;">0 samples</span>
      </div>
      <div class="stat-row">
        <span>Total Collected</span>
        <span id="totalCount" style="color: var(--accent2); font-weight: 600;">0 samples</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
      </div>
      <div style="margin-top: 8px; font-size: 11px; color: var(--muted);">
        Goal: 260 samples (10 per letter)
      </div>
    </div>

    <div>
      <div class="section-title">Last Sample Preview</div>
      <div class="preview-data" id="previewData">No data captured yet</div>
    </div>

    <div style="margin-top: auto;">
      <button class="btn primary" onclick="trainAndExport()" style="width: 100%;">
        🤖 Train Model & Export
      </button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// State
const state = {
  currentLetter: 'A',
  dataset: {},
  handDetected: false,
  currentLandmarks: null,
  cameraStarted: false
};

const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

const videoEl = document.getElementById('videoEl');
const overlayCanvas = document.getElementById('overlayCanvas');
const ctx = overlayCanvas.getContext('2d');
const captureBtn = document.getElementById('captureBtn');

// Add a START CAMERA button if not present
const startBtn = document.createElement('button');
startBtn.className = 'btn primary';
startBtn.textContent = '📷 START CAMERA';
startBtn.style.cssText = 'position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100;';
startBtn.onclick = startCamera;
document.querySelector('.video-section').appendChild(startBtn);

// Init letter grid
const letterGrid = document.getElementById('letterGrid');
LETTERS.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'letter-btn';
  btn.textContent = letter;
  btn.id = `btn-${letter}`;
  btn.onclick = () => selectLetter(letter);
  letterGrid.appendChild(btn);
});

function selectLetter(letter) {
  state.currentLetter = letter;
  document.getElementById('targetLetter').textContent = letter;
  document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${letter}`).classList.add('active');
  updateStats();
}

let hands;

async function startCamera() {
  startBtn.textContent = 'Loading...';
  
  try {
    // First test basic camera access
    const testStream = await navigator.mediaDevices.getUserMedia({ video: true });
    testStream.getTracks().forEach(t => t.stop());
    
    // Now set up MediaPipe
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: 'user' }
    });
    
    videoEl.srcObject = stream;
    await videoEl.play();
    
    overlayCanvas.width = videoEl.videoWidth;
    overlayCanvas.height = videoEl.videoHeight;
    
    // Init MediaPipe
    hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6,
    });
    
    hands.onResults(onHandResults);
    
    // Use Camera utility
    const camera = new Camera(videoEl, {
      onFrame: async () => {
        await hands.send({ image: videoEl });
      },
      width: 1280,
      height: 720
    });
    
    camera.start();
    state.cameraStarted = true;
    startBtn.style.display = 'none'; // Hide button once started
    
    showToast('Camera started! Show your hand.');
    
  } catch (err) {
    startBtn.textContent = '❌ ERROR - Click to Retry';
    console.error(err);
    alert('Camera Error: ' + err.message + '\n\nMake sure you:\n1. Are on HTTPS (not file://)\n2. Allowed camera permissions\n3. Have a camera connected');
  }
}

function onHandResults(results) {
  const w = overlayCanvas.width;
  const h = overlayCanvas.height;
  ctx.clearRect(0, 0, w, h);
  
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    state.handDetected = true;
    state.currentLandmarks = results.multiHandLandmarks[0];
    drawLandmarks(state.currentLandmarks, w, h);
    captureBtn.disabled = false;
  } else {
    state.handDetected = false;
    state.currentLandmarks = null;
    captureBtn.disabled = true;
  }
}

function drawLandmarks(lms, w, h) {
  const pts = lms.map(p => ({ x: p.x * w, y: p.y * h }));
  const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  
  ctx.strokeStyle = 'rgba(79,255,176,0.6)';
  ctx.lineWidth = 2;
  connections.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  });
  
  pts.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, i === 0 ? 8 : 4, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? '#4fffb0' : '#00e5ff';
    ctx.fill();
  });
}

// [Keep the rest of your functions: captureSample, updateStats, etc.]

function updateStats() {
  const currentData = state.dataset[state.currentLetter] || [];
  const totalData = Object.values(state.dataset).reduce((a, b) => a + b.length, 0);
  document.getElementById('currentCount').textContent = `${currentData.length} samples`;
  document.getElementById('totalCount').textContent = `${totalData} samples`;
  const progress = (totalData / (LETTERS.length * 10)) * 100;
  document.getElementById('progressBar').style.width = `${Math.min(progress, 100)}%`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

selectLetter('A');
</script>

</body>
</html>
